<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriChain Pro — Mobile Secure</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --primary: #639922; --bg: #0f110c; --surface: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.1); --font-display: 'Syne', sans-serif; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #e0e0e0; overflow-x: hidden; }

  /* NAV */
  nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(15, 17, 12, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000; }
  .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; color: #fff; text-decoration: none; cursor: pointer; user-select: none; }
  .nav-logo span { color: var(--primary); }
  .menu-toggle { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .menu-toggle span { width: 28px; height: 3px; background: #fff; border-radius: 2px; }

  .nav-popup { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: rgba(20, 22, 16, 0.98); backdrop-filter: blur(25px); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; gap: 1.5rem; transition: 0.4s; z-index: 2000; }
  .nav-popup.open { right: 0; }
  .close-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; align-self: flex-end; }
  .pop-link { text-decoration: none; color: #aaa; font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; }

  /* LAYOUT */
  #app { padding-top: 90px; width: 90%; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
  .page { display: none; opacity: 0; }
  .page.active { display: block; opacity: 1; }
  .section-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-top: 25px; }
  .btn-primary { background: var(--primary); color: #fff; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
  input { width: 100%; padding: 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; font-size: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th, td { padding: 10px 5px; border-bottom: 1px solid var(--border); text-align: left; }
  .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo" id="logoLink">Agri<span>Chain</span></div>
  <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>

<div class="nav-popup" id="navPopup">
  <button class="close-btn" onclick="toggleMenu()">✕</button>
  <a href="#" class="pop-link" onclick="navAction('home')">🏠 Home</a>
  <a href="#" class="pop-link" onclick="navAction('sell')">📢 Sell Crop</a>
</div>

<div id="app">
  <section id="page-home" class="page active">
    <div style="text-align:center; padding:40px 0;">
      <h1 style="font-family:var(--font-display); font-size:2.5rem;">Secure Supply<br><span style="color:var(--primary)">Chain</span></h1>
      <p style="color:#888; margin-top:15px;">Mandi prices se behtar. Direct Farmer-to-Warehouse.</p>
      <button class="btn-primary" onclick="navAction('sell')">Start Selling →</button>
    </div>
  </section>

  <section id="page-sell" class="page">
    <div class="section-box">
      <h2 style="font-family:var(--font-display); color:var(--primary); margin-bottom:15px;">📢 Listing Form</h2>
      <form id="farmerForm">
        <input type="text" id="s_name" placeholder="Apka Naam" required>
        <input type="text" id="s_crop" placeholder="Fasal" required>
        <input type="number" id="s_qty" placeholder="Quantity (KG)" required>
        <button type="submit" class="btn-primary">Register Batch</button>
      </form>
    </div>
  </section>

  <section id="page-admin-auth" class="page">
    <div class="section-box" style="max-width: 400px; margin: auto;">
      <h2 style="font-family:var(--font-display); margin-bottom:15px;">🔐 Identity Check</h2>
      <input type="password" id="adminPass" placeholder="Enter Secret Code">
      <button class="btn-primary" onclick="verifyAdmin()">Unlock</button>
    </div>
  </section>

  <section id="page-dashboard" class="page">
    <h2 style="font-family:var(--font-display); margin-bottom:15px;">📊 Pending Requests</h2>
    <div class="section-box" style="overflow-x:auto; padding: 15px;">
      <table>
        <thead><tr><th>Farmer</th><th>Crop</th><th>Qty</th><th>Action</th></tr></thead>
        <tbody id="txnTableBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
  const API_URL = "https://agrichain-backend-y068.onrender.com/api";
  const SECRET = "Adil_Agri_Secure_786";
  let isVerified = false;

  function toggleMenu() { document.getElementById('navPopup').classList.toggle('open'); }
  function navAction(p) { toggleMenu(); showPage(p); }

  function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'dashboard' && isVerified) renderDashboard();
  }

  // 🕵️‍♂️ MOBILE SECRET TRAP: Long Press Logo (3 seconds)
  let pressTimer;
  const logo = document.getElementById('logoLink');

  logo.addEventListener('touchstart', (e) => {
    pressTimer = window.setTimeout(() => {
      showPage('admin-auth');
    }, 3000); // 3 seconds tak pakad ke rakho
  });

  logo.addEventListener('touchend', () => { clearTimeout(pressTimer); });

  function verifyAdmin() {
    if(document.getElementById('adminPass').value === SECRET) {
      isVerified = true;
      showPage('dashboard');
    } else { alert("Access Denied!"); }
  }

  document.getElementById('farmerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      farmerName: document.getElementById('s_name').value,
      crop: document.getElementById('s_crop').value,
      quantity: parseInt(document.getElementById('s_qty').value)
    };
    await fetch(`${API_URL}/public/list-crop`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    alert("Listing Request Sent!");
    showPage('home');
  });

  async function renderDashboard() {
    const res = await fetch(`${API_URL}/inventory`);
    const data = await res.json();
    document.getElementById('txnTableBody').innerHTML = data.map(t => {
      const pending = t.grade.includes('Pending');
      return `
        <tr>
          <td>${t.farmerName}</td>
          <td>${t.crop}</td>
          <td>${t.quantity}</td>
          <td>${pending ? `<button onclick="accept('${t._id}')" style="background:#2ecc71; border:none; color:#fff; padding:5px; border-radius:4px;">Approve</button>` : '✅'}</td>
        </tr>
      `;
    }).join('');
  }

  async function accept(id) {
    if(!isVerified) return;
    await fetch(`${API_URL}/inventory/verify/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-api-key': SECRET }
    });
    renderDashboard();
  }
</script>
</body>
</html>
