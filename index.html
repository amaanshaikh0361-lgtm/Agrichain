<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriChain Pro — Farmer & Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --primary: #639922; --bg: #0f110c; --surface: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.1); --font-display: 'Syne', sans-serif; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #e0e0e0; overflow-x: hidden; }

  nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(15, 17, 12, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000; }
  .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; color: #fff; text-decoration: none; }
  .nav-logo span { color: var(--primary); }
  .menu-toggle { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .menu-toggle span { width: 28px; height: 3px; background: #fff; border-radius: 2px; }

  .nav-popup { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: rgba(20, 22, 16, 0.98); backdrop-filter: blur(25px); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; gap: 1.5rem; transition: 0.4s; z-index: 2000; }
  .nav-popup.open { right: 0; }
  .close-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; align-self: flex-end; }
  .pop-link { text-decoration: none; color: #aaa; font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; }

  #app { padding-top: 90px; width: 90%; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
  .page { display: none; opacity: 0; }
  .page.active { display: block; opacity: 1; }
  .section-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-top: 30px; }
  .btn-primary { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
  input { width: 100%; padding: 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#" onclick="showPage('home')">Agri<span>Chain</span></a>
  <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>

<div class="nav-popup" id="navPopup">
  <button class="close-btn" onclick="toggleMenu()">✕</button>
  <a href="#" class="pop-link" onclick="navAction('home')">🏠 Home</a>
  <a href="#" class="pop-link" onclick="navAction('sell')">📢 Sell Your Crop</a>
  <a href="#" class="pop-link" onclick="navAction('dashboard')">📊 Admin Dash</a>
</div>

<div id="app">
  <section id="page-home" class="page active">
    <div style="text-align:center; padding:40px 0;">
      <h1 style="font-family:var(--font-display); font-size:3rem;">Farm To <span style="color:var(--primary)">Warehouse</span></h1>
      <p style="color:#888; margin:20px 0;">Mandi prices se 5% sasta. Trusted by 1,200+ farmers.</p>
      <button class="btn-primary" style="width:auto; padding:15px 40px;" onclick="navAction('sell')">Sell Your Crop Now →</button>
    </div>
  </section>

  <section id="page-sell" class="page">
    <div class="section-box">
      <h2 style="font-family:var(--font-display); color:var(--primary); margin-bottom:15px;">📢 Register Your Crop</h2>
      <form id="farmerSellForm">
        <input type="text" id="s_name" placeholder="Farmer Name" required>
        <input type="text" id="s_crop" placeholder="Crop (Wheat, Rice, etc.)" required>
        <input type="number" id="s_qty" placeholder="Quantity (KG)" required>
        <button type="submit" class="btn-primary">Submit Listing Request</button>
      </form>
    </div>
  </section>

  <section id="page-dashboard" class="page">
    <h2 style="font-family:var(--font-display); margin-bottom:20px;">📊 Admin Overview</h2>
    <div class="section-box" style="overflow-x:auto;">
        <table>
            <thead><tr><th>ID</th><th>Farmer</th><th>Crop</th><th>Qty</th><th>Status</th></tr></thead>
            <tbody id="txnTableBody"></tbody>
        </table>
    </div>
  </section>
</div>

<script>
  const API_URL = "https://agrichain-backend-y068.onrender.com/api";
  const ADMIN_KEY = "Adil_Agri_Secure_786";

  function toggleMenu() { document.getElementById('navPopup').classList.toggle('open'); }
  function navAction(p) { toggleMenu(); showPage(p); }
  function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'dashboard') renderDashboard();
  }

  // Farmer Listing (Public Route)
  document.getElementById('farmerSellForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      farmerName: document.getElementById('s_name').value,
      crop: document.getElementById('s_crop').value,
      quantity: parseInt(document.getElementById('s_qty').value)
    };
    const res = await fetch(`${API_URL}/public/list-crop`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if(res.ok) { alert("Sent to Admin!"); document.getElementById('farmerSellForm').reset(); showPage('home'); }
  });

  async function renderDashboard() {
    const res = await fetch(`${API_URL}/inventory`);
    const data = await res.json();
    document.getElementById('txnTableBody').innerHTML = data.map(t => `
      <tr>
        <td><code>${t.batchId}</code></td>
        <td>${t.farmerName}</td>
        <td>${t.crop}</td>
        <td>${t.quantity} KG</td>
        <td style="color:${t.grade.includes('Pending') ? '#ffa500' : 'var(--primary)'}">${t.grade}</td>
      </tr>
    `).join('');
  }

  window.onload = renderDashboard;
</script>
</body>
</html>
