<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriChain Pro — Digital Transparency</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #639922; --bg: #0f110c; --surface: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.1); --font-display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #e0e0e0; overflow-x: hidden; }

  /* 🟢 NAVIGATION */
  nav {
    position: fixed; top: 0; width: 100%; height: 70px;
    background: rgba(15, 17, 12, 0.95); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); display: flex;
    align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000;
  }
  .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; color: #fff; text-decoration: none; }
  .nav-logo span { color: var(--primary); }
  .menu-toggle { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .menu-toggle span { width: 28px; height: 3px; background: #fff; border-radius: 2px; }

  /* 🟢 POP-UP MENU (RE-ACTIVATED) */
  .nav-popup {
    position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
    background: rgba(20, 22, 16, 0.98); backdrop-filter: blur(25px);
    border-left: 1px solid var(--border); display: flex;
    flex-direction: column; padding: 25px; gap: 1.5rem;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000;
  }
  .nav-popup.open { right: 0; }
  .popup-header { display: flex; justify-content: flex-end; }
  .close-btn { background: none; border: none; color: #fff; font-size: 2.2rem; cursor: pointer; }
  .pop-link { text-decoration: none; color: #aaa; font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; transition: 0.3s; }
  .pop-link:hover { color: var(--primary); transform: translateX(10px); }

  /* 🟢 LAYOUT */
  #app { padding-top: 90px; width: 90%; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
  .page { display: none; opacity: 0; transition: opacity 0.3s ease; }
  .page.active { display: block; opacity: 1; }
  .section-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-top: 30px; }
  
  /* 🟢 CARDS & BUTTONS */
  .hero { text-align: center; padding: 40px 0; }
  .hero h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 3.5rem); line-height: 1.1; margin-bottom: 15px; }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
  .card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 18px; border: 1px solid var(--border); }
  
  .step { display: flex; gap: 1rem; align-items: flex-start; margin-bottom: 1.2rem; background: rgba(255,255,255,0.01); padding: 15px; border-radius: 15px; border-left: 3px solid var(--primary); }
  .step-num { background: var(--primary); color: #fff; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }

  .metric-card { background: var(--surface); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
  .btn-primary { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99,153,34,0.2); }
  
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th { text-align: left; color: #666; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.85rem; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#" onclick="showPage('home')">Agri<span>Chain</span></a>
  <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>

<div class="nav-popup" id="navPopup">
  <div class="popup-header"><button class="close-btn" onclick="toggleMenu()">✕</button></div>
  <a href="#" class="pop-link" onclick="navAction('home')">🏠 Home</a>
  <a href="#" class="pop-link" onclick="navAction('shop')">🛒 Buy Crops</a>
  <a href="#" class="pop-link" onclick="navAction('dashboard')">📊 Dashboard</a>
</div>

<div id="app">
  <section id="page-home" class="page active">
    <div class="hero">
      <h1>Direct From<br><span style="color:var(--primary)">Farm To Warehouse</span></h1>
      <p style="color:#888; margin: 20px auto; max-width: 500px;">Mandi prices se 5% sasta, 100% verified batches. Trusted by 1,200+ farmers.</p>
      <button class="btn-primary" style="width:auto; padding: 15px 40px;" onclick="navAction('shop')">Explore Market →</button>
    </div>
    </section>

  <section id="page-dashboard" class="page">
    <h2 style="font-family: var(--font-display); margin-bottom: 20px;">📊 Dashboard</h2>
    <div class="info-grid" style="margin-bottom: 2rem;">
        <div class="metric-card"><p>Total Inventory</p><h2 id="m1" style="color:var(--primary)">Loading...</h2></div>
        <div class="metric-card"><p>Active Farmers</p><h2 id="m2" style="color:var(--primary)">0</h2></div>
        <div class="metric-card"><p>Trade Value</p><h2 id="m3" style="color:var(--primary)">₹ 0</h2></div>
    </div>
    <div class="section-box">
        <h3 style="font-family: var(--font-display); margin-bottom: 1rem;">Recent Transactions</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>ID</th><th>Farmer</th><th>Crop</th><th>Qty (KG)</th><th>Status</th></tr></thead>
                <tbody id="txnTableBody"></tbody>
            </table>
        </div>
    </div>
  </section>
</div>

<script>
  // RENDER BACKEND URL
  const API_URL = "https://agrichain-backend-y068.onrender.com/api/inventory";

  function toggleMenu() { document.getElementById('navPopup').classList.toggle('open'); }
  function navAction(page) { toggleMenu(); showPage(page); }

  function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'dashboard') fetchAndRenderDashboard();
    window.scrollTo(0,0);
  }

  async function fetchAndRenderDashboard() {
    try {
      const response = await fetch(API_URL);
      const batches = await response.json();

      if (batches && batches.length > 0) {
        // Stats Calculation
        const totalQty = batches.reduce((a, b) => a + b.quantity, 0);
        const farmers = [...new Set(batches.map(b => b.farmerName))].length;

        // UI Update (Original IDs)
        document.getElementById('m1').innerText = totalQty + ' KG';
        document.getElementById('m2').innerText = farmers;
        document.getElementById('m3').innerText = '₹' + (totalQty * 23).toLocaleString('en-IN'); // Sample logic

        // Table Update
        document.getElementById('txnTableBody').innerHTML = batches.map(t => `
          <tr>
            <td><code>${t.batchId}</code></td>
            <td>${t.farmerName}</td>
            <td>${item.crop || 'Wheat'}</td>
            <td>${t.quantity}</td>
            <td style="color:var(--primary); font-weight:bold;">VERIFIED</td>
          </tr>
        `).join('');
      }
    } catch (err) {
      console.error("Backend Error:", err);
      document.getElementById('m1').innerText = "Offline";
    }
  }

  // Initial render for Dashboard if it's the home state
  window.onload = () => { fetchAndRenderDashboard(); };
</script>
</body>
</html>
