<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriChain Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: 'Inter', sans-serif; color: #ffffff; }
        .nav-logo { font-weight: 800; font-size: 28px; letter-spacing: -1px; }
        .nav-logo span { color: #4ade80; }
        
        /* Exact Card Style from your screenshot */
        .glass-card { 
            background: #161616; 
            border-radius: 20px; 
            padding: 25px;
            margin-bottom: 15px;
            border: 1px solid #222;
            text-align: center;
        }
        .stat-label { color: #9ca3af; font-size: 14px; margin-bottom: 5px; }
        .stat-value { color: #4ade80; font-size: 32px; font-weight: 700; }
        
        /* Table Styling */
        .table-container {
            background: #111111;
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #222;
        }
        table { width: 100%; border-collapse: collapse; }
        th { color: #4b5563; font-size: 12px; text-transform: uppercase; padding-bottom: 15px; text-align: left; }
        td { padding: 15px 0; border-top: 1px solid #1f2937; font-size: 14px; }
        .batch-id { color: #22c55e; font-weight: 600; }
        .status-verified { color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6">
        <h1 class="nav-logo text-white">Agri<span>Chain</span></h1>
        <div class="flex items-center gap-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="text-gray-400" viewBox="0 0 16 16">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
            </svg>
            <div class="bg-gray-800 px-4 py-1.5 rounded-full text-sm font-medium">Adil Liyakat</div>
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
            </svg>
        </div>
    </header>

    <div class="flex items-center gap-2 mb-6 text-gray-400">
        <span class="text-xs">monitoring</span>
        <span class="bg-blue-900/30 text-blue-400 text-[10px] px-2 py-0.5 rounded border border-blue-800/30">Live</span>
    </div>

    <div class="glass-card">
        <p class="stat-label">TOTAL INVENTORY</p>
        <h3 id="total-inventory-val" class="stat-value">Loading...</h3>
    </div>

    <div class="glass-card">
        <p class="stat-label">ACTIVE FARMERS</p>
        <h3 id="active-farmers-count" class="stat-value">0</h3>
    </div>

    <div class="glass-card">
        <p class="stat-label">TRADE VALUE</p>
        <h3 class="stat-value text-green-500">₹ 2,81,740</h3>
    </div>

    <div class="table-container">
        <div class="flex justify-between items-center mb-6">
            <h4 class="font-bold text-gray-200">RECENT TRANSACTIONS</h4>
            <span class="text-green-500 text-xs font-bold">View All</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>BATCH ID</th>
                    <th>FARMER</th>
                    <th>CROP</th>
                    <th>QTY</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="transaction-table-body">
                </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
