<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriChain | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; background: #111; border-right: 1px solid #222; height: 100vh; position: fixed; }
        .main-content { margin-left: 260px; padding: 20px; }
        .glass-card { background: #161616; border: 1px solid #222; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .nav-item { padding: 12px 20px; color: #888; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: #2ecc71; border-radius: 10px; }
        .stat-val { color: #2ecc71; font-size: 32px; font-weight: 800; }
        /* Tera original popup/button style yahan rehne de */
    </style>
</head>
<body>

    <div class="sidebar p-4">
        <div class="text-2xl font-bold mb-10 px-4">Agri<span class="text-green-500">Chain</span></div>
        <div class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-box"></i> Inventory</div>
        <div class="nav-item"><i class="fas fa-users"></i> Farmers</div>
        <div class="nav-item"><i class="fas fa-history"></i> Transactions</div>
        <div class="nav-item mt-20 text-red-500"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </div>

    <div class="main-content">
        <div class="flex justify-between items-center mb-10 bg-black/50 p-4 rounded-xl border border-gray-800">
            <div class="relative w-1/3">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-500"></i>
                <input type="text" class="w-full bg-gray-900 border-none rounded-full py-3 pl-12 text-sm" placeholder="Search batches...">
            </div>
            <div class="flex items-center gap-6">
                <i class="fas fa-bell text-gray-500"></i>
                <div class="bg-gray-800 px-4 py-2 rounded-full flex items-center gap-3">
                    <span class="text-sm font-medium">Adil Liyakat</span>
                    <div class="w-8 h-8 bg-green-600 rounded-full"></div>
                </div>
                <i class="fas fa-bars text-2xl cursor-pointer"></i> </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card">
                <p class="text-gray-500 text-xs uppercase font-bold mb-2">Total Inventory</p>
                <h3 id="total-inventory-val" class="stat-val">Loading...</h3>
            </div>
            <div class="glass-card">
                <p class="text-gray-500 text-xs uppercase font-bold mb-2">Active Farmers</p>
                <h3 id="active-farmers-count" class="stat-val">0</h3>
            </div>
            <div class="glass-card">
                <p class="text-gray-500 text-xs uppercase font-bold mb-2">Trade Value</p>
                <h3 class="stat-val">₹ 2,81,740</h3> </div>
        </div>

        <div class="glass-card mt-6">
            <div class="flex justify-between items-center mb-6">
                <h4 class="font-bold">Recent Transactions</h4>
                <button class="text-green-500 text-sm font-bold">View All</button>
            </div>
            <table class="w-full text-left">
                <thead class="text-gray-500 text-xs border-b border-gray-800">
                    <tr>
                        <th class="pb-4">BATCH ID</th>
                        <th class="pb-4">FARMER</th>
                        <th class="pb-4">CROP</th>
                        <th class="pb-4">QTY</th>
                        <th class="pb-4">STATUS</th>
                    </tr>
                </thead>
                <tbody id="transaction-table-body" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
