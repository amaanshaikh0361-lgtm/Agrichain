<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriChain Pro — Digital Transparency</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #639922; --bg: #0f110c; --surface: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.1); --font-display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #e0e0e0; overflow-x: hidden; }

  /* 🟢 NAVIGATION */
  nav {
    position: fixed; top: 0; width: 100%; height: 70px;
    background: rgba(15, 17, 12, 0.95); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); display: flex;
    align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000;
  }
  .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; color: #fff; text-decoration: none; }
  .nav-logo span { color: var(--primary); }
  .menu-toggle { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .menu-toggle span { width: 28px; height: 3px; background: #fff; border-radius: 2px; }

  /* 🟢 POP-UP MENU */
  .nav-popup {
    position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
    background: rgba(20, 22, 16, 0.98); backdrop-filter: blur(25px);
    border-left: 1px solid var(--border); display: flex;
    flex-direction: column; padding: 25px; gap: 1.5rem;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000;
  }
  .nav-popup.open { right: 0; }
  .popup-header { display: flex; justify-content: flex-end; }
  .close-btn { background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }
  .pop-link { text-decoration: none; color: #aaa; font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; transition: 0.3s; }
  .pop-link:hover { color: var(--primary); transform: translateX(10px); }

  /* 🟢 LAYOUT */
  #app { padding-top: 100px; width: 90%; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
  .page { display: none; opacity: 0; }
  .page.active { display: block; opacity: 1; }
  .section-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-top: 30px; }
  
  /* 🟢 DASHBOARD SPECIFIC */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .metric-card { background: var(--surface); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
  .metric-card h2 { font-family: var(--font-display); color: var(--primary); font-size: 2rem; margin-top: 5px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
  th { text-align: left; color: #666; padding: 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 0.75rem; }
  td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); }

  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
  .btn-primary { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }

  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  .floating { animation: float 4s infinite ease-in-out; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#" onclick="showPage('home')">Agri<span>Chain</span></a>
  <div class="menu-toggle" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="nav-popup" id="navPopup">
  <div class="popup-header"><button class="close-btn" onclick="toggleMenu()">✕</button></div>
  <a href="#" class="pop-link" onclick="navAction('home')">🏠 Home</a>
  <a href="#" class="pop-link" onclick="navAction('shop')">🛒 Buy Crops</a>
  <a href="#" class="pop-link" onclick="navAction('dashboard')">📊 Dashboard</a>
</div>

<div id="app">
  <section id="page-home" class="page active">
    <div style="text-align: center; padding: 40px 0;">
      <h1 style="font-family: var(--font-display); font-size: 3.5rem; line-height: 1.1;">Fresh Crops,<br><span style="color:var(--primary)">Fair Prices.</span></h1>
      <p style="color:#888; margin: 20px auto; max-width: 500px;">Direct from farmers to your warehouse. 5% cheaper than Mandi.</p>
      <button class="btn-primary" style="width:auto; padding: 15px 40px;" onclick="navAction('shop')">Explore Market →</button>
    </div>
  </section>

  <section id="page-shop" class="page">
    <h2 style="font-family: var(--font-display); margin-bottom: 20px;">🛒 Market Inventory</h2>
    <div class="shop-grid" id="shopGrid"></div>
  </section>

  <section id="page-dashboard" class="page">
    <h2 style="font-family: var(--font-display); margin-bottom: 20px;">📊 Warehouse Dashboard</h2>
    <div class="metric-grid">
        <div class="metric-card"><p>Total Inventory</p><h2 id="m1">0 Qt</h2></div>
        <div class="metric-card"><p>Active Farmers</p><h2 id="m2">0</h2></div>
        <div class="metric-card"><p>Trade Value</p><h2 id="m3">₹0</h2></div>
    </div>
    <div class="section-box">
        <h3 style="font-family: var(--font-display); margin-bottom: 1rem;">Recent Transactions</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>ID</th><th>Farmer</th><th>Crop</th><th>Qty</th><th>Total</th></tr></thead>
                <tbody id="txnTableBody"></tbody>
            </table>
        </div>
    </div>
  </section>
</div>

<script>
  // 🟢 ORIGINAL DATA
  const DB = {
    farmers: [
      { id: 'F001', name: 'Ramesh Patil', crop: 'Onion' },
      { id: 'F002', name: 'Sunita Devi', crop: 'Wheat' },
      { id: 'F004', name: 'Harpreet Singh', crop: 'Rice' }
    ],
    inventory: [
      { id: 'B001', crop: 'Wheat', farmerName: 'Sunita Devi', qty: 240 },
      { id: 'B002', crop: 'Onion', farmerName: 'Ramesh Patil', qty: 180 },
      { id: 'B004', crop: 'Rice', farmerName: 'Harpreet Singh', qty: 320 }
    ],
    prices: { Wheat: 2320, Onion: 1850, Rice: 3100, Tomato: 1450, Potato: 1250 },
    transactions: [
      { id: 'T001', farmer: 'Sunita Devi', crop: 'Wheat', qty: 80, total: 176320 },
      { id: 'T002', farmer: 'Ramesh Patil', crop: 'Onion', qty: 60, total: 105420 }
    ]
  };

  function toggleMenu() { document.getElementById('navPopup').classList.toggle('open'); }
  function navAction(page) { toggleMenu(); showPage(page); }

  function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    if(p === 'shop') renderShop();
    if(p === 'dashboard') renderDashboard();
    window.scrollTo(0,0);
  }

  function renderShop() {
    const grid = document.getElementById('shopGrid');
    grid.innerHTML = Object.entries(DB.prices).map(([crop, price]) => `
      <div class="metric-card">
        <h3 style="font-family:var(--font-display)">${crop}</h3>
        <h2 style="color:var(--primary)">₹${Math.round(price * 0.95)}/Qt</h2>
        <button class="btn-primary">Add to Cart</button>
      </div>
    `).join('');
  }

  function renderDashboard() {
    // Totals logic
    const totalQty = DB.inventory.reduce((a, b) => a + b.qty, 0);
    const totalVal = DB.transactions.reduce((a, b) => a + b.total, 0);
    
    document.getElementById('m1').innerText = totalQty + ' Qt';
    document.getElementById('m2').innerText = DB.farmers.length;
    document.getElementById('m3').innerText = '₹' + totalVal.toLocaleString('en-IN');

    document.getElementById('txnTableBody').innerHTML = DB.transactions.map(t => `
      <tr>
        <td><code>${t.id}</code></td>
        <td>${t.farmer}</td>
        <td>${t.crop}</td>
        <td>${t.qty}</td>
        <td><strong>₹${t.total.toLocaleString('en-IN')}</strong></td>
      </tr>
    `).join('');
  }

  window.onload = () => { renderDashboard(); };
</script>
</body>
</html>
