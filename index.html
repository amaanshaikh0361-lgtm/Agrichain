<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriChain | Secure Supply Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .card-bg { background: #161616; border: 1px solid #262626; border-radius: 12px; }
        .text-green-custom { color: #22c55e; }
    </style>
</head>
<body>

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 bg-black z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-leaf text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Agri<span class="text-green-500">Chain</span></h1>
        </div>
        <div class="flex items-center gap-4 text-gray-400 text-sm">
            <span><i class="fas fa-search"></i></span>
            <span class="bg-gray-800 px-3 py-1 rounded-full text-xs text-white">Adil Liyakat</span>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-2xl font-bold">Dashboard</h2>
                <p class="text-gray-500 text-sm">Real-time supply chain monitoring</p>
            </div>
            <div class="text-xs text-gray-500 bg-gray-900 px-3 py-1 rounded border border-gray-800">
                Network: <span class="text-green-500">Render API Live</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card-bg p-6">
                <p class="text-gray-400 text-xs uppercase tracking-wider mb-2 font-semibold">Total Inventory</p>
                <h3 id="total-inventory-val" class="text-3xl font-bold text-green-custom tracking-tighter">Loading...</h3>
            </div>
            
            <div class="card-bg p-6">
                <p class="text-gray-400 text-xs uppercase tracking-wider mb-2 font-semibold">Active Farmers</p>
                <h3 id="active-farmers-count" class="text-3xl font-bold text-green-custom tracking-tighter">0</h3>
            </div>

            <div class="card-bg p-6">
                <p class="text-gray-400 text-xs uppercase tracking-wider mb-2 font-semibold">Trade Value</p>
                <h3 class="text-3xl font-bold text-green-custom tracking-tighter">₹ 2,81,740</h3>
            </div>
        </div>

        <div class="card-bg overflow-hidden">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/30">
                <h4 class="font-bold text-sm uppercase tracking-widest text-gray-400">Recent Transactions</h4>
                <button class="text-xs text-green-500 font-bold hover:underline">View All</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-gray-500 text-xs border-b border-gray-800 bg-black/20">
                        <tr>
                            <th class="py-4 px-6 font-medium">BATCH ID</th>
                            <th class="font-medium">FARMER</th>
                            <th class="font-medium">CROP</th>
                            <th class="font-medium">QTY</th>
                            <th class="font-medium">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table-body" class="text-sm divide-y divide-gray-800">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
