<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriChain Pro — Smart Supply Chain</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">Agri<span>Chain</span></div>
        <div class="nav-links">
            <a href="#" class="active" onclick="showPage('home')">Home</a>
            <a href="#" id="shop-link" onclick="showPage('shop')">Market</a>
            <a href="#" id="dash-link" style="display:none;" onclick="showPage('dashboard')">Dashboard</a>
        </div>
        <div class="auth-box">
            <button id="login-btn" class="btn-glow" onclick="login()">Get Started</button>
            <div id="user-profile" style="display:none;" class="profile-chip">
                <img id="user-img" src="" alt="user">
                <span id="user-name"></span>
                <button onclick="logout()" class="logout-icon">Logout</button>
            </div>
        </div>
    </nav>

    <main id="app-content">
        <section id="home" class="page active">
            <div class="hero-content">
                <h1 class="reveal-text">Direct From Farm <br> To <span>Your Warehouse</span></h1>
                <p class="fade-in">Mandi prices se 5% sasta, 100% verified batches.</p>
                <button class="btn-primary ripple" onclick="showPage('shop')">Explore Market</button>
            </div>
            <div class="hero-visual">
                <div class="blob"></div>
            </div>
        </section>

        <section id="shop" class="page">
            <div class="section-header">
                <h2>Live Crop Market</h2>
                <div class="filters" id="crop-filters"></div>
            </div>
            <div class="shop-grid" id="contentful-shop">
                <div class="loader">Loading Fresh Crops...</div>
            </div>
        </section>

        <section id="dashboard" class="page">
            <h2>Warehouse Insights</h2>
            <div class="stats-container">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
